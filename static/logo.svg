<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#gradient1)" />
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Chef hat -->
  <ellipse cx="100" cy="130" rx="45" ry="15" fill="white" opacity="0.95"/>
  <rect x="60" y="90" width="80" height="40" fill="white" opacity="0.95" rx="5"/>
  
  <!-- Hat puffs -->
  <circle cx="75" cy="75" r="18" fill="white" opacity="0.95"/>
  <circle cx="100" cy="65" r="22" fill="white" opacity="0.95"/>
  <circle cx="125" cy="75" r="18" fill="white" opacity="0.95"/>
  
  <!-- Fork -->
  <g transform="translate(55, 140)">
    <rect x="8" y="0" width="4" height="35" fill="url(#gradient2)" rx="2"/>
    <rect x="2" y="0" width="3" height="15" fill="url(#gradient2)" rx="1.5"/>
    <rect x="7" y="0" width="3" height="15" fill="url(#gradient2)" rx="1.5"/>
    <rect x="12" y="0" width="3" height="15" fill="url(#gradient2)" rx="1.5"/>
  </g>
  
  <!-- Spoon -->
  <g transform="translate(130, 140)">
    <rect x="8" y="10" width="4" height="25" fill="url(#gradient2)" rx="2"/>
    <ellipse cx="10" cy="8" rx="7" ry="9" fill="url(#gradient2)"/>
  </g>
</svg>